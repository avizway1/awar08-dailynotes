document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n  :root {\n    --bg: #0A0E1A;\n    --bg-2: #0d1424;\n    --panel: rgba(14, 22, 40, 0.72);\n    --panel-solid: #0e1628;\n    --line: rgba(0, 200, 255, 0.18);\n    --line-soft: rgba(255, 255, 255, 0.06);\n    --ink: #E6EEF9;\n    --ink-dim: #8A9BB4;\n    --ink-faint: #4E607C;\n    --orange: #FF9900;\n    --orange-2: #FFB547;\n    --cyan: #00C8FF;\n    --cyan-2: #6FE5FF;\n    --green: #35D29A;\n    --red: #FF5A5A;\n  }\n  * { box-sizing: border-box; }\n  html, body {\n    margin: 0; padding: 0;\n    background: var(--bg);\n    color: var(--ink);\n    font-family: 'Rajdhani', sans-serif;\n    height: 100%;\n    overflow: hidden;\n    letter-spacing: 0.02em;\n  }\n  body {\n    background:\n      radial-gradient(1200px 800px at 70% 40%, rgba(0, 120, 180, 0.08), transparent 60%),\n      radial-gradient(900px 700px at 20% 80%, rgba(255, 153, 0, 0.05), transparent 70%),\n      #0A0E1A;\n    position: relative;\n  }\n  /* grid overlay */\n  body::before {\n    content: \"\";\n    position: fixed; inset: 0;\n    background-image:\n      linear-gradient(rgba(0, 200, 255, 0.04) 1px, transparent 1px),\n      linear-gradient(90deg, rgba(0, 200, 255, 0.04) 1px, transparent 1px);\n    background-size: 60px 60px;\n    pointer-events: none;\n    z-index: 0;\n  }\n  /* corner framing marks */\n  .frame-mark {\n    position: fixed;\n    width: 22px; height: 22px;\n    border: 1px solid var(--cyan);\n    opacity: 0.55;\n    z-index: 20;\n    pointer-events: none;\n  }\n  .frame-mark.tl { top: 10px; left: 10px; border-right: none; border-bottom: none; }\n  .frame-mark.tr { top: 10px; right: 10px; border-left: none; border-bottom: none; }\n  .frame-mark.bl { bottom: 10px; left: 10px; border-right: none; border-top: none; }\n  .frame-mark.br { bottom: 10px; right: 10px; border-left: none; border-top: none; }\n\n  .app {\n    position: relative;\n    z-index: 1;\n    display: grid;\n    grid-template-rows: 60px 110px 1fr 36px;\n    height: 100vh;\n    gap: 10px;\n    padding: 10px;\n  }\n\n  /* ======= HEADER BAR ======= */\n  .header {\n    display: flex;\n    align-items: center;\n    padding: 10px 18px;\n    background: linear-gradient(180deg, rgba(14,22,40,0.95), rgba(14,22,40,0.7));\n    border: 1px solid var(--line);\n    position: relative;\n    gap: 18px;\n  }\n  .header::before, .header::after {\n    content: \"\"; position: absolute; width: 8px; height: 8px;\n    background: var(--orange); top: -4px;\n  }\n  .header::before { left: -4px; }\n  .header::after { right: -4px; }\n\n  .h-left { display: flex; align-items: center; gap: 12px; flex-shrink: 0; min-width: 0; }\n  .h-center { flex: 1; min-width: 0; display: flex; justify-content: center; }\n  .h-right { display: flex; align-items: center; gap: 14px; flex-shrink: 0; font-family: 'JetBrains Mono', monospace; font-size: 11px; }\n  .h-title {\n    font-weight: 600;\n    font-size: 15px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--ink);\n    white-space: nowrap;\n  }\n  .h-title b { color: var(--orange); font-weight: 600; }\n  .h-tag {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 9px;\n    color: var(--ink-faint);\n    letter-spacing: 0.28em;\n    text-transform: uppercase;\n    padding: 4px 10px;\n    border: 1px solid var(--line);\n  }\n\n  .h-center {\n    display: flex; align-items: center; gap: 12px;\n    min-width: 0;\n  }\n\n  /* Search */\n  .search {\n    position: relative;\n    display: flex; align-items: center;\n    width: 100%;\n    max-width: 380px;\n    background: rgba(5, 10, 20, 0.6);\n    border: 1px solid var(--line);\n    padding: 0 12px 0 36px;\n    height: 36px;\n    font-family: 'JetBrains Mono', monospace;\n  }\n  .search:focus-within {\n    border-color: var(--orange);\n    box-shadow: 0 0 0 1px rgba(255,153,0,0.3), 0 0 20px rgba(255,153,0,0.15);\n  }\n  .search svg {\n    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);\n    width: 14px; height: 14px; color: var(--cyan);\n  }\n  .search input {\n    flex: 1;\n    background: transparent;\n    border: none;\n    outline: none;\n    color: var(--ink);\n    font-family: inherit;\n    font-size: 12px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    padding: 0;\n  }\n  .search input::placeholder { color: var(--ink-faint); letter-spacing: 0.18em; }\n  .search-kbd {\n    font-size: 9px; color: var(--ink-faint);\n    border: 1px solid var(--line);\n    padding: 2px 6px;\n    letter-spacing: 0.1em;\n  }\n  .search-results {\n    position: absolute;\n    top: calc(100% + 6px); left: 0; right: 0;\n    background: #0a1020;\n    border: 1px solid var(--line);\n    max-height: 280px; overflow-y: auto;\n    z-index: 100;\n    display: none;\n  }\n  .search-results.open { display: block; }\n  .search-results div {\n    padding: 8px 12px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    color: var(--ink-dim);\n    cursor: pointer;\n    display: flex; justify-content: space-between;\n    border-bottom: 1px solid var(--line-soft);\n  }\n  .search-results div:hover, .search-results div.hl {\n    background: rgba(255,153,0,0.1);\n    color: var(--ink);\n  }\n  .search-results .sr-code { color: var(--cyan); }\n\n  .h-right {\n    display: flex; align-items: center; justify-content: flex-end; gap: 14px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    flex-shrink: 0;\n  }\n  .h-clock {\n    display: flex; flex-direction: column; align-items: flex-end; gap: 2px;\n  }\n  .h-clock .k { color: var(--ink-faint); font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; }\n  .h-clock .v { color: var(--ink); font-size: 14px; letter-spacing: 0.15em; font-variant-numeric: tabular-nums; }\n  .h-aviz {\n    display: flex; align-items: center; gap: 8px;\n    padding: 6px 10px;\n    border: 1px solid var(--line);\n    background: rgba(0,0,0,0.3);\n    text-decoration: none;\n    color: var(--ink-dim);\n    font-size: 9px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    transition: all 0.15s;\n  }\n  .h-aviz:hover { border-color: var(--orange); color: var(--ink); }\n  .h-aviz img { width: 22px; height: 22px; object-fit: contain; }\n  .h-aviz .at { color: var(--orange); }\n  .h-yt {\n    color: var(--cyan);\n    text-decoration: none;\n    display: inline-flex; align-items: center; gap: 6px;\n    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;\n    padding: 6px 10px;\n    border: 1px solid var(--line);\n  }\n  .h-yt:hover { color: var(--cyan-2); border-color: var(--cyan); }\n  .h-yt svg { width: 13px; height: 13px; }\n  .status-pill {\n    display: inline-flex; align-items: center; gap: 8px;\n    padding: 6px 12px;\n    border: 1px solid rgba(53, 210, 154, 0.4);\n    background: rgba(53, 210, 154, 0.08);\n    color: var(--green);\n    font-size: 10px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n  }\n  .dot {\n    width: 6px; height: 6px; border-radius: 50%;\n    background: var(--green);\n    box-shadow: 0 0 8px var(--green);\n    animation: blink 1.6s ease-in-out infinite;\n  }\n  @keyframes blink { 50% { opacity: 0.35; } }\n\n  /* ======= STATS ======= */\n  .stats {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 12px;\n  }\n  .stat {\n    position: relative;\n    background: var(--panel);\n    border: 1px solid var(--line);\n    padding: 14px 16px;\n    display: flex;\n    flex-direction: column;\n    justify-content: space-between;\n    overflow: hidden;\n    min-width: 0;\n  }\n  .stat::before {\n    content: \"\"; position: absolute; top: 0; left: 0; height: 2px; width: 40%;\n    background: var(--accent, var(--cyan));\n  }\n  .stat::after {\n    content: \"\"; position: absolute; bottom: 0; right: 0; width: 60px; height: 60px;\n    background: radial-gradient(circle at bottom right, var(--accent, var(--cyan)) 0%, transparent 60%);\n    opacity: 0.12;\n  }\n  .stat .label {\n    display: flex; justify-content: space-between; align-items: center;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    color: var(--ink-dim);\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    gap: 8px;\n    white-space: nowrap;\n  }\n  .stat .label > span:first-child {\n    overflow: hidden; text-overflow: ellipsis;\n  }\n  .stat .code {\n    color: var(--ink-faint);\n    font-size: 9px;\n  }\n  .stat .value {\n    font-weight: 600;\n    font-size: 44px;\n    line-height: 1;\n    letter-spacing: 0.01em;\n    color: var(--ink);\n    font-variant-numeric: tabular-nums;\n    white-space: nowrap;\n  }\n  .stat .value .unit {\n    font-size: 12px;\n    color: var(--accent, var(--cyan));\n    margin-left: 6px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    font-weight: 500;\n  }\n  .stat .delta {\n    display: flex; align-items: center; gap: 8px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    color: var(--ink-dim);\n    letter-spacing: 0.15em;\n  }\n  .stat .delta .up { color: var(--green); }\n  .spark {\n    height: 22px; width: 100%;\n    display: flex; align-items: flex-end; gap: 2px;\n    margin-top: 6px;\n  }\n  .spark i {\n    display: block;\n    flex: 1;\n    background: var(--accent, var(--cyan));\n    opacity: 0.55;\n  }\n\n  .stat.s-regions  { --accent: var(--orange); }\n  .stat.s-az       { --accent: var(--cyan); }\n  .stat.s-cf       { --accent: var(--orange); }\n  .stat.s-local    { --accent: var(--cyan); }\n\n  /* ======= MAIN GRID ======= */\n  .main {\n    display: grid;\n    grid-template-columns: 300px 1fr 320px;\n    gap: 12px;\n    min-height: 0;\n  }\n  .panel {\n    background: var(--panel);\n    border: 1px solid var(--line);\n    padding: 14px;\n    display: flex; flex-direction: column;\n    min-height: 0;\n    position: relative;\n  }\n  .panel-head {\n    display: flex; align-items: center; justify-content: space-between;\n    padding-bottom: 10px;\n    border-bottom: 1px dashed var(--line-soft);\n    margin-bottom: 10px;\n  }\n  .panel-title {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n    display: flex; align-items: center; gap: 8px;\n  }\n  .panel-title::before {\n    content: \"\"; width: 6px; height: 6px; background: var(--orange);\n  }\n  .panel-id {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 9px;\n    color: var(--ink-faint);\n    letter-spacing: 0.15em;\n  }\n\n  /* Globe panel */\n  .globe-panel {\n    padding: 0;\n    overflow: hidden;\n    position: relative;\n  }\n  #globe-canvas {\n    position: absolute; inset: 0;\n    width: 100%; height: 100%;    display: block;\n    cursor: grab;\n    touch-action: none;\n  }\n  #globe-canvas:active { cursor: grabbing; }\n  .globe-hud {\n    position: absolute;\n    pointer-events: none;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    letter-spacing: 0.2em;\n    color: var(--cyan);\n    text-transform: uppercase;\n  }\n  .hud-tl { top: 14px; left: 14px; }\n  .hud-tr { top: 14px; right: 14px; text-align: right; }\n  .hud-bl { bottom: 44px; left: 14px; max-width: calc(100% - 28px); }\n  .hud-bl .hud-val { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n  .hud-br { top: 14px; left: 50%; transform: translateX(-50%); text-align: center; display: none; }\n  .hud-label { color: var(--ink-faint); font-size: 9px; }\n  .hud-val { color: var(--ink); font-size: 11px; letter-spacing: 0.15em; }\n\n  .crosshair {\n    position: absolute;\n    left: 50%; top: 50%;\n    width: 180px; height: 180px;\n    transform: translate(-50%, -50%);\n    border: 1px solid rgba(0, 200, 255, 0.15);\n    border-radius: 50%;\n    pointer-events: none;\n  }\n  .crosshair::before, .crosshair::after {\n    content: \"\"; position: absolute;\n    background: rgba(0, 200, 255, 0.15);\n  }\n  .crosshair::before { top: 50%; left: -12px; right: -12px; height: 1px; }\n  .crosshair::after { left: 50%; top: -12px; bottom: -12px; width: 1px; }\n\n  .legend {\n    position: absolute;\n    bottom: 14px; right: 14px; left: 14px;\n    display: flex; flex-direction: row; gap: 10px; align-items: center; justify-content: flex-end; flex-wrap: nowrap;\n    padding: 5px 8px;\n    background: rgba(10, 14, 26, 0.80);\n    border: 1px solid var(--line);\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 8px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n    pointer-events: none;\n    z-index: 6;\n    backdrop-filter: blur(6px);\n    overflow: hidden;\n  }\n  .legend-title { display: none; }\n  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 8px; white-space: nowrap; min-width: 0; }\n  .legend-dot {\n    width: 8px; height: 8px; border-radius: 50%;\n    box-shadow: 0 0 10px currentColor;\n    flex-shrink: 0;\n  }\n\n  /* Region info tooltip on globe */\n  .info-tip {\n    position: absolute;\n    z-index: 8;\n    min-width: 240px;\n    background: linear-gradient(180deg, rgba(14,22,40,0.97), rgba(10,14,26,0.97));\n    border: 1px solid var(--orange);\n    padding: 12px 14px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    color: var(--ink);\n    opacity: 0;\n    transform: translate(-50%, -100%) translateY(-16px);\n    pointer-events: none;\n    transition: opacity 0.2s ease;\n    box-shadow: 0 0 30px rgba(255,153,0,0.25);\n  }\n  .info-tip.show { opacity: 1; pointer-events: auto; }\n  .info-tip::before {\n    content: \"\"; position: absolute;\n    left: 50%; bottom: -7px; transform: translateX(-50%) rotate(45deg);\n    width: 12px; height: 12px;\n    background: rgba(14,22,40,0.97);\n    border-right: 1px solid var(--orange);\n    border-bottom: 1px solid var(--orange);\n  }\n  .info-tip::after {\n    content: \"\"; position: absolute;\n    top: -4px; left: -4px; width: 8px; height: 8px;\n    border-top: 1px solid var(--orange); border-left: 1px solid var(--orange);\n  }\n  .info-tip .it-code {\n    color: var(--cyan);\n    font-size: 10px;\n    letter-spacing: 0.18em;\n  }\n  .info-tip .it-name {\n    font-family: 'Rajdhani', sans-serif;\n    font-size: 18px;\n    font-weight: 600;\n    color: var(--ink);\n    letter-spacing: 0.08em;\n    margin: 2px 0 10px;\n  }\n  .info-tip .it-row {\n    display: flex; justify-content: space-between;\n    padding: 3px 0;\n    font-size: 10px;\n    letter-spacing: 0.1em;\n  }\n  .info-tip .it-row .k { color: var(--ink-faint); }\n  .info-tip .it-row .v { color: var(--ink); }\n  .info-tip .it-row .v.orange { color: var(--orange); }\n  .info-tip .it-row .v.green { color: var(--green); }\n  .info-tip .it-row .v.white { color: #fff; }\n  .info-tip .it-close {\n    position: absolute; top: 6px; right: 8px;\n    color: var(--ink-faint); cursor: pointer;\n    font-size: 14px; line-height: 1;\n    background: none; border: none;\n    font-family: inherit;\n  }\n  .info-tip .it-close:hover { color: var(--orange); }\n  .info-tip .it-status {\n    display: inline-block;\n    padding: 2px 8px;\n    font-size: 9px;\n    letter-spacing: 0.2em;\n    margin-bottom: 8px;\n    border: 1px solid currentColor;\n    color: var(--green);\n  }\n  .info-tip .it-status.soon { color: #fff; }\n\n  /* Region list */\n  .region-list {\n    flex: 1;\n    overflow-y: auto;\n    display: flex; flex-direction: column; gap: 4px;\n    padding-right: 4px;\n  }\n  .region-list::-webkit-scrollbar { width: 6px; }\n  .region-list::-webkit-scrollbar-thumb { background: rgba(0, 200, 255, 0.2); }\n\n  .region-row {\n    display: grid;\n    grid-template-columns: 72px 1fr auto;\n    align-items: center;\n    gap: 10px;\n    padding: 8px 10px;\n    border: 1px solid transparent;\n    cursor: pointer;\n    tran n: true },\n  { code: 'cl-central-1',   name: 'Chile (Santiago)',  lat: -33.45, lon: -70.67, az: 3, launched: 'Planned', soon: true },\n  { code: 'sa-south-1',     name: 'Saudi Arabia',      lat: 24.71,  lon: 46.68,  az: 3, launched: 'Planned', soon: true }\n];\n\n// Extra CloudFront-style POPs (smaller cyan dots, not full regions)\nconst EDGE_POPS = [\n  [40.71,-74.00],[34.05,-118.24],[41.88,-87.63],[47.61,-122.33],[29.76,-95.37],[25.76,-80.19],\n  [33.75,-84.39],[39.74,-104.99],[32.78,-96.80],[43.65,-79.38],[49.28,-123.12],[19.43,-99.13],\n  [-34.60,-58.38],[-22.91,-43.17],[-12.05,-77.04],[4.71,-74.07],\n  [55.68,12.57],[60.17,24.94],[52.37,4.90],[48.14,11.58],[41.90,12.50],[38.72,-9.14],\n  [50.85,4.35],[59.91,10.75],[37.98,23.73],[41.01,28.98],[44.43,26.10],\n  [28.61,77.21],[13.08,80.27],[12.97,77.59],[22.57,88.36],[23.81,90.41],\n  [31.23,121.47],[22.54,114.06],[23.13,113.26],[39.99,116.31],[43.07,141.35],\n  [14.60,120.98],[10.82,106.63],[21.03,105.85],\n  [-6.18,106.83],[-27.47,153.03],[-31.95,115.86],\n  [-1.29,36.82],[30.04,31.23],[33.87,10.10],[6.52,3.37],[-26.20,28.04],\n  [41.32,69.24],[40.41,49.87],[43.25,76.95],[50.45,30.52]\n];\n\n// =========================================================\n// CLOCK + TICKER + STATS COUNTUP + SPARKLINES + EVENT LOG\n// =========================================================\nconst pad = n => String(n).padStart(2,'0');\nfunction updateClock(){\n  const d = new Date();\n  document.getElementById('clock').textContent =\n    `${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}:${pad(d.getUTCSeconds())}`;\n}\nupdateClock(); setInterval(updateClock, 1000);\n\n// Stat countup\ndocument.querySelectorAll('.stat .value').forEach(el => {\n  const target = +el.dataset.target;\n  const suffix = el.dataset.suffix || '';\n  const unitHTML = el.querySelector('.unit')?.outerHTML || '';\n  let cur = 0;\n  const dur = 1400;\n  const t0 = performance.now();\n  function step(t){\n    const k = Math.min(1, (t - t0)/dur);\n    const eased = 1 - Math.pow(1-k, 3);\n    cur = Math.floor(target * eased);\n    el.innerHTML = `${cur}${k===1?suffix:''}${unitHTML}`;\n    if (k < 1) requestAnimationFrame(step);\n  }\n  requestAnimationFrame(step);\n});\n\n// Sparklines\ndocument.querySelectorAll('.spark').forEach(el => {\n  const seed = el.dataset.spark.length;\n  for (let i=0;i<32;i++){\n    const bar = document.createElement('i');\n    const h = 20 + Math.abs(Math.sin(i*0.6 + seed))*60 + Math.random()*20;\n    bar.style.height = Math.min(100, h) + '%';\n    bar.style.opacity = 0.3 + (i/32)*0.6;\n    el.appendChild(bar);\n  }\n});\n\n// Ticker\nconst tickerItems = [\n  ['◉', 'us-east-1', '42ms'], ['◉', 'eu-west-1', '18ms'], ['◉', 'ap-northeast-1', '12ms'],\n  ['◉', 'CloudFront IAD50', '6ms'], ['◉', 'CloudFront LHR3', '4ms'],\n  ['↑', 'ap-southeast-7 launched', 'Apr 2026'], ['↑', 'mx-central-1 launched', 'Jan 2025'],\n  ['◉', 'sa-east-1', '88ms'], ['◉', 'af-south-1', '104ms'],\n  ['⚡', 'Local Zone DFW', 'online'], ['⚡', 'Local Zone BOS', 'online'],\n  ['◉', 'ap-south-1', '22ms'], ['◉', 'me-central-1', '54ms']\n];\nconst tickerTrack = document.getElementById('ticker-track');\nconst buildTicker = () => tickerItems.map(([a,b,c]) => `<span><em>${a}<\u002Fem> <b>${b}<\u002Fb> · ${c}<\u002Fspan>`).join('');\ntickerTrack.innerHTML = buildTicker() + buildTicker();\n\n// Region list\nconst listEl = document.getElementById('region-list');\nlet activeRegion = 0;\nREGIONS.forEach((r, i) => {\n  const row = document.createElement('div');\n  row.className = 'region-row' + (i === 0 ? ' active' : '') + (r.soon ? ' soon' : '');\n  row.innerHTML = `\n    <div class=\"region-code\">${r.code}<\u002Fdiv>\n    <div class=\"region-name\">${r.name}<\u002Fdiv>\n    <div class=\"region-az\">${r.soon ? 'SOON' : 'AZ·'+r.az}<\u002Fdiv>`;\n  row.addEventListener('click', () => selectRegion(i));\n  listEl.appendChild(row);\n});\n\nfunction selectRegion(i, showTip = true){\n  activeRegion = i;\n  [...listEl.children].forEach((el, k) => el.classList.toggle('active', k === i));\n  const r = REGIONS[i];\n  document.getElementById('t-code').textContent = r.code;\n  document.getElementById('t-name').textContent = r.name;\n  document.getElementById('t-az').textContent = r.soon ? '—' : r.az;\n  document.getElementById('t-launched').textContent = r.launched;\n  document.getElementById('tracking').textContent = `${r.code.toUpperCase()} · ${r.name.toUpperCase()}`;\n  const lat = (20 + Math.floor(Math.random()*120));\n  document.getElementById('latency').textContent = (r.soon ? '—' : lat + ' ms');\n  // refresh capacity bars\n  const c1 = r.soon ? 0 : 40 + Math.floor(Math.random()*50);\n  const c2 = r.soon ? 0 : 25 + Math.floor(Math.random()*55);\n  const c3 = r.soon ? 0 : 30 + Math.floor(Math.random()*55);\n  document.getElementById('cap1').textContent = c1 + '%';\n  document.getElementById('cap2').textContent = c2 + '%';\n  document.getElementById('cap3').textContent = c3 + '%';\n  document.getElementById('bar1').style.width = c1 + '%';\n  document.getElementById('bar2').style.width = c2 + '%';\n  document.getElementById('bar3').style.width = c3 + '%';\n  // Info tooltip fields\n  document.getElementById('it-code').textContent = r.code;\n  document.getElementById('it-name').textContent = r.name;\n  const statusEl = document.getElementById('it-status');\n  if (r.soon) {\n    statusEl.textContent = '○ COMING SOON';\n    statusEl.classList.add('soon');\n  } else {\n    statusEl.textContent = '● ACTIVE';\n    statusEl.classList.remove('soon');\n  }\n  document.getElementById('it-az').textContent = r.soon ? '—' : r.az;\n  document.getElementById('it-launched').textContent = r.launched;\n  const latDir = r.lat >= 0 ? 'N' : 'S';\n  const lonDir = r.lon >= 0 ? 'E' : 'W';\n  document.getElementById('it-coords').textContent = `${Math.abs(r.lat).toFixed(1)}°${latDir}, ${Math.abs(r.lon).toFixed(1)}°${lonDir}`;\n  document.getElementById('it-latency').textContent = r.soon ? '—' : lat + ' ms';\n  focusRegion(i);\n  // show , 'Session established · NOC-SEA-01');\nlogEvent('info', 'Globe mesh loaded · 39 regions, 52 POPs');\nlogEvent('info', 'Heartbeat OK · 750+ edge nodes');\nconst sampleEvents = [\n  ['ok', 'eu-west-1 health check passed'],\n  ['info', 'CloudFront IAD50 reloaded policy'],\n  ['warn', 'ap-southeast-3 elevated p99 latency'],\n  ['ok', 'local zone DFW reporting nominal'],\n  ['info', 'new edge POP activated · Kuala Lumpur'],\n  ['ok', 'us-west-2 AZ-c capacity rebalanced'],\n  ['info', 'route53 TTL sync complete'],\n];\nsetInterval(() => {\n  const ev = sampleEvents[Math.floor(Math.random()*sampleEvents.length)];\n  logEvent(ev[0], ev[1]);\n}, 4500);\n\n// =========================================================\n// THREE.JS GLOBE\n// =========================================================\nconst canvas = document.getElementById('globe-canvas');\nconst renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true, preserveDrawingBuffer: true });\nrenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));\n\nconst scene = new THREE.Scene();\nconst camera = new THREE.PerspectiveCamera(38, 1, 0.1, 100);\ncamera.position.set(0, 0, 8);\n\nfunction resize(){\n  const rect = canvas.parentElement.getBoundingClientRect();\n  renderer.setSize(rect.width, rect.height, false);\n  camera.aspect = rect.width / rect.height;\n  camera.updateProjectionMatrix();\n}\nresize();\nwindow.addEventListener('resize', resize);\n\n// ---------- Build stylized land-mass texture procedurally ----------\n// Uses a simplex-ish noise blend + continent silhouettes derived from a seed\n// of ellipse masks so we get a recognisable Earth-ish look without loading any\n// external textures.\nfunction makeEarthTexture(){\n  const W = 2048, H = 1024;\n  const cvs = document.createElement('canvas');\n  cvs.width = W; cvs.height = H;\n  const ctx = cvs.getContext('2d');\n\n  // Ocean gradient\n  const g = ctx.createLinearGradient(0, 0, 0, H);\n  g.addColorStop(0, '#061025');\n  g.addColorStop(0.5, '#081834');\n  g.addColorStop(1, '#050d1c');\n  ctx.fillStyle = g;\n  ctx.fillRect(0, 0, W, H);\n\n  // Subtle ocean noise dots\n  const img = ctx.getImageData(0, 0, W, H);\n  for (let i=0; i<img.data.length; i+=4){\n    const n = (Math.random()-0.5) * 12;\n    img.data[i]   = Math.max(0, img.data[i]+n);\n    img.data[i+1] = Math.max(0, img.data[i+1]+n);\n    img.data[i+2] = Math.max(0, img.data[i+2]+n);\n  }\n  ctx.putImageData(img, 0, 0);\n\n  // Latitude grid\n  ctx.strokeStyle = 'rgba(0, 200, 255, 0.08)';\n  ctx.lineWidth = 1;\n  for (let lat=-80; lat<=80; lat+=20){\n    const y = (1 - (lat+90)/180) * H;\n    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();\n  }\n  for (let lon=-180; lon<=180; lon+=20){\n    const x = ((lon+180)/360) * W;\n    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();\n  }\n\n  // Continents as rough clustered ellipses (stylized \"glowing landmass\" look).\n  // Each entry: [lon, lat, radiusLon, radiusLat, density]\n  const continents = [\n    // North America\n    [-100, 45, 32, 22, 1.0], [-85, 30, 16, 14, 1.0], [-130, 55, 18, 12, 1.0],\n    [-70, 45, 12, 10, 0.8], [-110, 20, 10, 8, 0.8],\n    // South America\n    [-60, -15, 14, 28, 1.0], [-70, -30, 8, 14, 0.9],\n    // Europe\n    [15, 52, 22, 12, 1.0], [5, 45, 10, 8, 0.9],\n    // Africa\n    [20, 5, 20, 22, 1.0], [25, -20, 14, 18, 1.0], [15, 30, 18, 10, 0.9],\n    // Middle East\n    [45, 30, 14, 12, 1.0],\n    // Asia\n    [80, 45, 40, 22, 1.0], [100, 30, 22, 16, 1.0], [125, 45, 16, 14, 1.0],\n    [75, 20, 14, 12, 1.0], [105, 15, 12, 10, 0.9],\n    // Indonesia/SE Asia\n    [115, -2, 16, 8, 0.9], [140, -5, 10, 8, 0.8],\n    // Australia\n    [135, -25, 16, 12, 1.0],\n    // Greenland\n    [-40, 72, 14, 10, 0.9],\n    // Antarctica strip\n    [0, -82, 170, 6, 0.7]\n  ];\n\n  // Render landmass glow + fill\n  continents.forEach(([lon, lat, rLon, rLat, dens]) => {\n    const cx = ((lon+180)/360) * W;\n    const cy = (1 - (lat+90)/180) * H;\n    const rx = (rLon/360) * W;\n    const ry = (rLat/180) * H;\n\n    // Outer glow\n    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(rx, ry)*1.3);\n    grad.addColorStop(0, `rgba(0, 200, 255, ${0.25*dens})`);\n    grad.addColorStop(0.5, `rgba(0, 120, 200, ${0.10*dens})`);\n    grad.addColorStop(1, 'rgba(0, 120, 200, 0)');\n    ctx.fillStyle = grad;\n    ctx.beginPath(); ctx.ellipse(cx, cy, rx*1.3, ry*1.3, 0, 0, Math.PI*2); ctx.fill();\n\n    // Jagged filled landmass (cluster of smaller blobs for irregular coastline)\n    const blobs = 80;\n    for (let b=0; b<blobs; b++){\n      const a = Math.random()*Math.PI*2;\n      const dr = Math.pow(Math.random(), 0.5);\n      const bx = cx + Math.cos(a) * rx * dr;\n      const by = cy + Math.sin(a) * ry * dr;\n      const br = (4 + Math.random()*14) * dens;\n      const hue = 190 + Math.random()*20;\n      const l = 14 + Math.random()*10;\n      ctx.fillStyle = `hsla(${hue}, 60%, ${l}%, 0.9)`;\n      ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI*2); ctx.fill();\n    }\n  });\n\n  // Coastline bright rim (slightly brighter small dots near landmass edges)\n  ctx.globalCompositeOperation = 'lighter';\n  continents.forEach(([lon, lat, rLon, rLat, dens]) => {\n    const cx = ((lon+180)/360) * W;\n    const cy = (1 - (lat+90)/180) * H;\n    const rx = (rLon/360) * W;\n    const ry = (rLat/180) * H;\n    for (let k=0;k<30;k++){\n      const a = Math.random()*Math.PI*2;\n      const ex = cx + Math.cos(a)*rx*(0.85 + Math.random()*0.2);\n      const ey = cy + Math.sin(a)*ry*(0.85 + Math.random()*0.2);\n      ctx.fillStyle = `rgba(120, 220, 255, ${0.15*dens})`;\n      ctx.beginPath(); ctx.arc(ex, ey, 1.2+Math.random()*1.6, 0, Math.PI*2); ctx.fill();\n    }\n  });\n  ctx.globalCompositeOperation = 'source-over';\n\n  const tex = new THREE.CanvasTexture(cvs);\n  tex.colorSpace = THREE.SRGBColorSpace;\n  tex.anisotropy = 4;\n  return tex;\n}\n\nconst earthTexture = makeEarthTexture();\n\n// ---------- Globe sphere ----- Listener('pointercancel', endDrag);\ncanvas.addEventListener('pointerleave', endDrag);\n\n// default cursor state\ncanvas.style.cursor = 'grab';\n\ncanvas.addEventListener('click', (e) => {\n  if (didDrag) { didDrag = false; return; }\n  const rect = canvas.getBoundingClientRect();\n  pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;\n  pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;\n  raycaster.setFromCamera(pointer, camera);\n  const hits = raycaster.intersectObjects(markerGroup.children, false);\n  for (const h of hits) {\n    if (h.object.userData && h.object.userData.regionIndex !== undefined) {\n      selectRegion(h.object.userData.regionIndex);\n      return;\n    }\n  }\n});\ncanvas.addEventListener('mousemove', (e) => {\n  if (isDragging) return;\n  const rect = canvas.getBoundingClientRect();\n  pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;\n  pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;\n  raycaster.setFromCamera(pointer, camera);\n  const hits = raycaster.intersectObjects(markerGroup.children, false);\n  const hit = hits.find(h => h.object.userData && h.object.userData.regionIndex !== undefined);\n  canvas.style.cursor = hit ? 'pointer' : 'grab';\n});\n\n// ========== SEARCH ==========\nconst searchInput = document.getElementById('search');\nconst searchResults = document.getElementById('search-results');\nlet srHL = -1;\n\nfunction runSearch(q){\n  q = q.trim().toLowerCase();\n  searchResults.innerHTML = '';\n  if (!q) { searchResults.classList.remove('open'); return; }\n  const matches = REGIONS\n    .map((r, i) => ({ r, i, score: matchScore(r, q) }))\n    .filter(m => m.score > 0)\n    .sort((a,b) => b.score - a.score)\n    .slice(0, 8);\n  if (!matches.length) {\n    searchResults.innerHTML = '<div style=\"color:var(--ink-faint); justify-content:center\">No matches<\u002Fdiv>';\n    searchResults.classList.add('open');\n    return;\n  }\n  matches.forEach((m, k) => {\n    const el = document.createElement('div');\n    el.className = k === 0 ? 'hl' : '';\n    el.innerHTML = `<span>${m.r.name}${m.r.soon ? ' <span style=\"color:#fff\">• soon<\u002Fspan>' : ''}<\u002Fspan><span class=\"sr-code\">${m.r.code}<\u002Fspan>`;\n    el.addEventListener('click', () => {\n      selectRegion(m.i);\n      searchInput.value = m.r.name;\n      searchResults.classList.remove('open');\n    });\n    searchResults.appendChild(el);\n  });\n  srHL = 0;\n  searchResults.classList.add('open');\n}\nfunction matchScore(r, q){\n  const name = r.name.toLowerCase();\n  const code = r.code.toLowerCase();\n  if (code === q || name === q) return 100;\n  if (code.startsWith(q)) return 50;\n  if (name.startsWith(q)) return 40;\n  if (code.includes(q)) return 20;\n  if (name.includes(q)) return 15;\n  return 0;\n}\nsearchInput.addEventListener('input', (e) => runSearch(e.target.value));\nsearchInput.addEventListener('keydown', (e) => {\n  const items = [...searchResults.children].filter(c => c.className.indexOf('hl') > -1 || c.tagName === 'DIV');\n  const all = [...searchResults.children];\n  if (e.key === 'Enter') {\n    const hit = all[srHL] || all[0];\n    if (hit) hit.click();\n    e.preventDefault();\n  } else if (e.key === 'ArrowDown') {\n    srHL = Math.min(all.length - 1, srHL + 1);\n    all.forEach((c, k) => c.classList.toggle('hl', k === srHL));\n    e.preventDefault();\n  } else if (e.key === 'ArrowUp') {\n    srHL = Math.max(0, srHL - 1);\n    all.forEach((c, k) => c.classList.toggle('hl', k === srHL));\n    e.preventDefault();\n  } else if (e.key === 'Escape') {\n    searchInput.blur();\n    searchResults.classList.remove('open');\n  }\n});\ndocument.addEventListener('click', (e) => {\n  if (!e.target.closest('.search')) searchResults.classList.remove('open');\n});\ndocument.addEventListener('keydown', (e) => {\n  if (e.key === '/' && document.activeElement !== searchInput) {\n    e.preventDefault();\n    searchInput.focus();\n  }\n});\n\n// Mobile: toggle sheet panels\nconst mobileTabs = document.querySelectorAll('.mobile-tab');\nmobileTabs.forEach(tab => {\n  tab.addEventListener('click', () => {\n    const target = tab.dataset.target;\n    document.querySelectorAll('.panel').forEach(p => p.classList.remove('mobile-active'));\n    if (target) document.querySelector(target).classList.add('mobile-active');\n    mobileTabs.forEach(t => t.classList.toggle('active', t === tab));\n  });\n});\n\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
